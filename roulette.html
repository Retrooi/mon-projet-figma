<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette - Foot Locker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="images/bafec5b9-a5f7-4f1d-88d5-dd2fdf3ddb58.png" alt="Logo officiel Foot Locker" class="main-logo">
    </header>

    <main class="game-container roulette-layout">
        
        <h1 id="titre-jeu" class="glow-text">TOURNE & GAGNE</h1>
        
        <section class="wheel-section" aria-labelledby="titre-jeu">
            <div class="marker" aria-hidden="true"></div>
            
            <div class="wheel-wrapper">
                <img src="images/Component 10.png" alt="Roue de la chance Foot Locker présentant les différents lots" class="the-wheel">
            </div>
        </section>

        <div class="cta-container">
            <a href="recompense.html" class="play-button btn-green" aria-label="Découvrir mon lot gagné">
                VOIR MON LOT
            </a>
        </div>

    </main>

</body>
</html>
